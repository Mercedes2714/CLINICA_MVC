{% extends 'base.html' %}

{% block title %}Registrar Médico{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Registrar Nuevo Médico</h4>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('medico.create') }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nombre" class="form-label">
                        Nombre Completo <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="nombre" name="nombre" 
                           placeholder="Dr. Juan Pérez" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="especialidad" class="form-label">
                        Especialidad <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="especialidad" name="especialidad" 
                           placeholder="Cardiología" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="telefono" class="form-label">
                        Teléfono <span class="text-danger">*</span>
                    </label>
                    <input type="tel" class="form-control" id="telefono" name="telefono" 
                           placeholder="123-456-7890" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="correo" class="form-label">
                        Correo Electrónico <span class="text-danger">*</span>
                    </label>
                    <input type="email" class="form-control" id="correo" name="correo" 
                           placeholder="juan.perez@clinica.com" required>
                </div>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                <a href="{{ url_for('medico.index') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar Médico
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
