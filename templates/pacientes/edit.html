{% extends 'base.html' %}

{% block title %}Editar Paciente{% endblock %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-warning">
        <h4 class="mb-0"><i class="bi bi-pencil"></i> Editar Paciente</h4>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('paciente.edit', id=paciente.id_paciente) }}">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre Completo *</label>
                <input type="text" class="form-control" id="nombre" name="nombre" 
                       value="{{ paciente.nombre }}" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="edad" class="form-label">Edad *</label>
                    <input type="number" class="form-control" id="edad" name="edad" 
                           value="{{ paciente.edad }}" min="0" max="150" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label for="telefono" class="form-label">Teléfono *</label>
                    <input type="tel" class="form-control" id="telefono" name="telefono" 
                           value="{{ paciente.telefono }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="direccion" class="form-label">Dirección *</label>
                <textarea class="form-control" id="direccion" name="direccion" 
                          rows="2" required>{{ paciente.direccion }}</textarea>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="{{ url_for('paciente.index') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-warning">Actualizar Paciente</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
